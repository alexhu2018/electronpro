<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Electron Hello World</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #dbeafe, var(--bg));
        color: var(--text);
      }

      .card {
        width: min(92vw, 520px);
        padding: 40px;
        border-radius: 20px;
        background: var(--card);
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2.4rem;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
      }

      .badge {
        display: inline-block;
        margin-bottom: 16px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(37, 99, 235, 0.1);
        color: var(--accent);
        font-size: 0.85rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">Electron Starter</div>
      <h1>Hello World</h1>
      <p>这是一个最经典的 Electron 入门应用。</p>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
